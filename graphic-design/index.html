  <div class="wave-backdrop">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">

        <filter id="grain">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
          <feComposite operator="in" in2="SourceGraphic"/>
        </filter>
      </defs>
      <path class="wave1" d="M0,300 C200,200 400,350 600,250 L800,300 L800,600 0,600Z" fill="#999999" filter="url(#grain)" opacity="0.8"/>
