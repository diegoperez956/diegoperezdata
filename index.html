function itemMetaHtml(item) {
  const fields = [];
  if (item.medium) fields.push(['medium', item.medium]);
  if (item.stack && item.stack.length) fields.push(['stack', item.stack]);
  if (item.year) fields.push(['year', item.year]);
  if (item.what) fields.push(['what', item.what]);
  if (item.why) fields.push(['why', item.why]);
  if (!fields.length) {
    return item.blurb ? `<p class="blurb">${escapeHtml(item.blurb)}</p>` : '';
  }
  const keyWidth = Math.max(...fields.map(f => f[0].length));
  const rows = fields.map(([k, v], i) => {
    const pad = ' '.repeat(keyWidth - k.length);
    const comma = i === fields.length - 1 ? '' : '<span class="punct">,</span>';
    let val;
    if (Array.isArray(v)) {
      val = `<span class="punct">[</span>${v.map(x => `<span class="str">"${escapeHtml(x)}"</span>`).join('<span class="punct">, </span>')}<span class="punct">]</span>`;
    } else if (/^\d+$/.test(String(v))) {
      val = `<span class="num">${escapeHtml(String(v))}</span>`;
    } else {
      val = `<span class="str">"${escapeHtml(String(v))}"</span>`;
    }
    return `  <span class="key">"${k}"</span><span class="punct">:</span>${pad} ${val}${comma}`;
  }).join('\n');
  return `<pre class="proj-json"><span class="punct">{</span>\n${rows}\n<span class="punct">}</span></pre>`;
}

function itemFrameHtml(item, section) {
  if (section === 'data-viz') {
    if (item.type === 'iframe') return `<iframe src="${item.src}" loading="lazy" frameborder="0" allowfullscreen></iframe>`;
    if (item.type === 'pdf') return `
      <img class="pdf-thumb" src="${item.thumb}" alt="${escapeHtml(item.title)} preview" loading="lazy" decoding="async"/>
      <div class="pdf-actions">
        <a href="${item.src}" target="_blank" rel="noopener">open pdf &rarr;</a>
        <a class="secondary" href="#" data-load-pdf="${item.src}">view inline</a>
      </div>`;
    return `<img src="${encodeURI(item.src)}" alt="${escapeHtml(item.title)}" loading="lazy" decoding="async"/>`;
  }
  return `<img src="${encodeURI(item.src)}" alt="${escapeHtml(item.title)}" loading="lazy" decoding="async"/>`;
}

function wireDeferredLoaders(root) {
  root.querySelectorAll('.frame-skeleton[data-iframe-src]').forEach(btn => {
    btn.addEventListener('click', () => {
      const iframe = document.createElement('iframe');
      iframe.src = btn.dataset.iframeSrc;
      iframe.loading = 'lazy';
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allowfullscreen', '');
      btn.replaceWith(iframe);
    });
  });
  root.querySelectorAll('a[data-load-pdf]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const src = a.dataset.loadPdf;
      const frame = a.closest('.focus-frame');
      if (!frame) return;
      frame.innerHTML = `
        <iframe src="${src}" loading="lazy" allowfullscreen></iframe>
        <div class="pdf-actions"><a href="${src}" target="_blank" rel="noopener">can't see it? open in new tab &rarr;</a></div>
      `;
    });
  });
}

const itemLocked = { 'data-viz': null, 'graphic-design': null };
const subSortState = {
  'data-viz':       { col: null, dir: 1 },
  'graphic-design': { col: null, dir: 1 }
};

function renderCollection(section, focusId) {
  const items = section === 'data-viz' ? dataViz : graphicDesign;
  const dirLabel = section === 'data-viz' ? '/selected-work' : '/visual-studies';
  const dirNote = section === 'data-viz'
    ? 'Dashboards, reports, public-data experiments, and analytical tools. Some built for stakeholders, some built to test a question. All attempts to make information easier to read without making it dumb.'
    : 'Posters, edits, layouts, and small graphic experiments. The design side leaks through: type, texture, contrast, restraint, mood. Not everything here is useful. That is part of the point.';
  const dirDate = section === 'data-viz' ? '2026-03-18' : '2025-11-09';
  const active = focusId || itemLocked[section] || items[0].id;
  itemLocked[section] = active;

  const typeOf = d => section === 'data-viz'
    ? (d.type === 'iframe' ? 'dashboard' : d.type === 'pdf' ? 'pdf' : 'image')
    : 'image';
  const subArrow = (col) => {
    const s = subSortState[section];
    if (s.col !== col) return '';
    return s.dir === 1 ? ' ▲' : ' ▼';
  };
  const headerHtml = `<a class="name-cell" data-sub-sort="name">Name${subArrow('name')}</a><a class="type-cell" data-sub-sort="type">Type${subArrow('type')}</a><a class="date-cell" data-sub-sort="date">Updated${subArrow('date')}</a>`;

  const sorted = [...items];
  const s = subSortState[section];
  if (s.col) {
    const keyFn = s.col === 'name' ? (d => d.title.toLowerCase())
                : s.col === 'type' ? (d => typeOf(d))
                : (d => d.date || dirDate);
    sorted.sort((a, b) => {
      const av = keyFn(a), bv = keyFn(b);
      return av < bv ? -s.dir : av > bv ? s.dir : 0;
    });
  }

  const rowSpans = sorted.map(d => {
    const typeLabel = typeOf(d);
    const date = d.date || dirDate;
    const cls = d.id === active ? 'row sub-row active' : 'row sub-row';
    return `<span class="${cls}" data-item="${d.id}" role="button" tabindex="0"><a class="name-cell" data-item="${d.id}">${escapeHtml(d.title)}</a><span class="type-cell">${typeLabel}</span><span class="date-cell">${date}</span></span>`;
  }).join('');

  const item = items.find(x => x.id === active);
  pane.innerHTML = `
    <h1 class="section-title">Index of ${dirLabel}</h1>
    <p class="meta">${items.length} entries &middot; last-modified: ${dirDate}</p>
    <p class="blurb" style="color:#a89984;max-width:60ch">${dirNote}</p>
    <div class="split">
      <div class="sub-list">
        <div class="listing"><span class="headers">${headerHtml}</span></div>
        <hr/>
        <div class="listing sub-rows">${rowSpans}</div>
      </div>
      <div class="sub-focus">
        <h2 style="margin-top:0">${escapeHtml(item.title)}</h2>
        ${itemMetaHtml(item)}
        <div class="focus-frame">${itemFrameHtml(item, section)}</div>
      </div>
    </div>
  `;

  const focusEl = pane.querySelector('.sub-focus');
  const listEl = pane.querySelector('.sub-list');
  let subLocked = active;
  wireDeferredLoaders(focusEl);

  function paintFocus(id) {
    const it = items.find(x => x.id === id);
    if (!it) return;
    focusEl.innerHTML = `<h2 style="margin-top:0">${escapeHtml(it.title)}</h2>${itemMetaHtml(it)}<div class="focus-frame">${itemFrameHtml(it, section)}</div>`;
    wireDeferredLoaders(focusEl);
    listEl.querySelectorAll('.sub-row').forEach(r => r.classList.toggle('active', r.dataset.item === id));
  }

  listEl.querySelectorAll('.sub-row').forEach(row => {
    if (canHover) row.addEventListener('mouseenter', () => paintFocus(row.dataset.item));
    const activate = (e) => {
      e.preventDefault();
      subLocked = row.dataset.item;
      itemLocked[section] = subLocked;
      paintFocus(subLocked);
    };
    row.addEventListener('click', activate);
    row.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') activate(e);
    });
  });
  listEl.querySelectorAll('a[data-sub-sort]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const col = a.dataset.subSort;
      const st = subSortState[section];
      if (st.col === col) st.dir = -st.dir;
      else { st.col = col; st.dir = 1; }
      renderCollection(section, itemLocked[section]);
    });
  });
  if (canHover) listEl.addEventListener('mouseleave', () => paintFocus(subLocked));
}
window.render = render;

function highlightActive(section) {
  document.querySelectorAll('#rows .row').forEach(r => {
    r.classList.toggle('active', r.dataset.section === section);
  });
}

let locked = null;

function wireRow(row) {
  const section = row.dataset.section;
  if (!section) return;
  if (canHover) {
    row.addEventListener('mouseenter', () => {
      prefetchHeavy(section);
      if (!locked) render(section);
    });
  }
  row.addEventListener('click', (e) => {
    e.preventDefault();
    locked = section;
    prefetchHeavy(section);
    render(section);
  });
}

const fileRows = [
  { name: 'selected-work/',  type: 'directory', date: '2026-03-18', section: 'data-viz' },
  { name: 'visual-studies/', type: 'directory', date: '2025-11-09', section: 'graphic-design' },
  { name: 'about',           type: 'file',      date: '2026-04-22', section: 'about' },
  { name: 'colophon',        type: 'file',      date: '2026-05-11', section: 'colophon' },
  { name: 'contact',         type: 'file',      date: '2024-08-03', section: 'contact' },
  { name: 'github.url',      type: 'link',      date: '2026-05-10', href: 'https://github.com/diegoperez956' },
  { name: 'linkedin.url',    type: 'link',      date: '2025-09-14', href: 'https://www.linkedin.com/in/diegoperez956/' },
  { name: 'resume.pdf',      type: 'file',      date: '2026-05-11', href: '/Diego_Perez_Resume.pdf' }
];

const userDirs = JSON.parse(localStorage.getItem('userDirs') || '[]');

const NAME_W = 17, TYPE_W = 12;
const sortState = { col: null, dir: 1 };

function padRight(s, n) { s = String(s); return s + ' '.repeat(Math.max(0, n - s.length)); }

function rowHtml(r) {
  const nameGap = ' '.repeat(Math.max(1, NAME_W - r.name.length));
  const typeCell = padRight(r.type, TYPE_W);
  const dateCell = r.date || '-';
  if (r.section) {
    return `<span class="row" data-section="${r.section}"><a data-section="${r.section}">${escapeHtml(r.name)}</a>${nameGap}${typeCell}${dateCell}</span>`;
  }
  if (r.href) {
    const ext = r.href.startsWith('http');
    const attrs = ext ? ' target="_blank" rel="noopener"' : '';
    return `<span class="row"><a href="${r.href}"${attrs}>${escapeHtml(r.name)}</a>${nameGap}${typeCell}${dateCell}</span>`;
  }
  return `<span class="row">${padRight(r.name, NAME_W)}${typeCell}${dateCell}</span>`;
}

function sortedRows() {
  const parent = { name: '../', type: 'parent', date: null, section: 'home' };
  const userRows = userDirs.map(d => ({ name: d.name + '/', type: 'directory', date: d.date, section: 'user:' + d.name }));
  let rest = [...fileRows, ...userRows];
  if (sortState.col) {
    const key = sortState.col;
    rest.sort((a, b) => {
      let av = a[key] || '', bv = b[key] || '';
      if (key === 'date') { av = av || '0000-00-00'; bv = bv || '0000-00-00'; }
      return av < bv ? -sortState.dir : av > bv ? sortState.dir : 0;
    });
  } else {
    const isDir = r => r.type === 'directory';
    rest.sort((a, b) => (isDir(b) - isDir(a)) || a.name.localeCompare(b.name));
  }
  return [parent, ...rest];
}

function renderRows() {
  const rowsEl = document.getElementById('rows');
  rowsEl.innerHTML = sortedRows().map(rowHtml).join('\n');
  rowsEl.querySelectorAll('.row[data-section]').forEach(wireRow);
}

function arrow(col) {
  if (sortState.col !== col) return '';
  return sortState.dir === 1 ? ' ▲' : ' ▼';
}

function renderHeaders() {
  const headersEl = document.getElementById('headers');
  const namePad = ' '.repeat(Math.max(1, NAME_W - ('Name'.length + arrow('name').length)));
  const typePad = ' '.repeat(Math.max(1, TYPE_W - ('Type'.length + arrow('type').length)));
  headersEl.innerHTML = `<span class="headers"><a data-sort="name">Name${arrow('name')}</a>${namePad}<a data-sort="type">Type${arrow('type')}</a>${typePad}<a data-sort="date">Updated${arrow('date')}</a></span>`;
  headersEl.querySelectorAll('a[data-sort]').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const col = a.dataset.sort;
      if (sortState.col === col) sortState.dir = -sortState.dir;
      else { sortState.col = col; sortState.dir = 1; }
      renderHeaders();
      renderRows();
    });
  });
}

renderHeaders();
renderRows();

if (canHover) {
  document.querySelector('#rows').addEventListener('mouseleave', () => {
    if (locked) render(locked);
  });
}

document.getElementById('mkdir-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('mkdir-input');
  const raw = input.value.trim().replace(/[^a-zA-Z0-9_\-]/g, '-');
  if (!raw) return;
  if (userDirs.some(d => d.name === raw)) { input.value = ''; return; }
  const today = new Date().toISOString().slice(0,10);
  userDirs.push({ name: raw, date: today });
  localStorage.setItem('userDirs', JSON.stringify(userDirs));
  input.value = '';
  renderRows();
});

const originalRender = render;
render = function(section, focusId) {
  if (section && section.startsWith('user:')) {
    const name = section.slice(5);
    pane.innerHTML = `
      <h1 class="section-title">Index of /${escapeHtml(name)}</h1>
      <p class="meta">0 entries &middot; created ${(userDirs.find(d=>d.name===name)||{}).date||''}</p>
      <p class="meta">empty directory.</p>
      <p><a data-rmdir="${escapeHtml(name)}">rm -rf ${escapeHtml(name)}/</a></p>
    `;
    pane.querySelector('a[data-rmdir]').addEventListener('click', (e) => {
      e.preventDefault();
      const i = userDirs.findIndex(d => d.name === name);
      if (i >= 0) {
        userDirs.splice(i, 1);
        localStorage.setItem('userDirs', JSON.stringify(userDirs));
        renderRows();
        locked = null;
        originalRender('home');
      }
    });
    highlightActive(section);
    return;
  }
  return originalRender(section, focusId);
};
window.render = render;

render('home');
</script>

</body>
